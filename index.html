<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Kakao Share</title>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
</head>
<body>
    <script>
        // 1. SDK 초기화 (본인의 JavaScript 키 입력)
        Kakao.init('b8650fa94e9f3a155c0c164546eab991'); 

        // Unity 웹뷰에서 호출할 메인 비동기 함수
        async function shareFromUnity(base64Image, shareText) {
            try {
                // 2. Base64 이미지를 파일 객체로 변환 (C# JPG 압축에 맞춰 jpeg로 설정)
                const file = base64ToFile(base64Image, 'share_image.jpg');

                // 3. 카카오 서버로 이미지 업로드
                const uploadRes = await Kakao.Share.uploadImage({
                    file: [file]
                });
                
                // 업로드된 이미지의 실제 카카오 CDN URL
                const imageUrl = uploadRes.infos[0].url;

                // ⭐ [핵심] 업로드 성공 즉시 유니티 콘솔로 CDN URL을 전송
                window.location.href = "unitywebview://kakaoshare?url=" + encodeURIComponent(imageUrl);

                // 4. 카카오톡 공유 실행
                Kakao.Share.sendDefault({
                    objectType: 'feed',
                    content: {
                        title: shareText,
                        imageUrl: imageUrl,
                        link: {
                            mobileWebUrl: 'https://[내아이디].github.io/[레포지토리명]',
                            webUrl: 'https://[내아이디].github.io/[레포지토리명]',
                        },
                    },
                    buttons: [
                        {
                            title: '앱에서 보기',
                            link: {
                                mobileWebUrl: 'https://[내아이디].github.io/[레포지토리명]',
                                webUrl: 'https://[내아이디].github.io/[레포지토리명]',
                                androidExecutionParams: 'from=kakao', 
                                iosExecutionParams: 'from=kakao'
                            }
                        }
                    ]
                });
            } catch (error) {
                console.error(error);
                // 에러 발생 시 유니티로 에러 알림
                window.location.href = "unitywebview://kakaoshare?error=" + encodeURIComponent(error.message);
            }
        }

        // Base64 변환 유틸리티
        function base64ToFile(base64String, filename) {
            let bstr = '';
            let mime = 'image/jpeg'; 

            if (base64String.startsWith('data:')) {
                let arr = base64String.split(',');
                mime = arr[0].match(/:(.*?);/)[1];
                bstr = atob(arr[1]);
            } else {
                bstr = atob(base64String);
            }

            let n = bstr.length;
            let u8arr = new Uint8Array(n);
            while(n--){
                u8arr[n] = bstr.charCodeAt(n);
            }
            return new File([u8arr], filename, {type: mime});
        }
    </script>
</body>
</html>
