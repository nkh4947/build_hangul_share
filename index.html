<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Kakao Share</title>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
</head>
<body>
    <script>
        Kakao.init('b8650fa94e9f3a155c0c164546eab991'); // 카카오 디벨로퍼스 JS 키

        async function shareFromUnity(base64Image, shareText) {
            try {
                const file = base64ToFile(base64Image, 'share_image.png');
                const uploadRes = await Kakao.Share.uploadImage({ file: [file] });
                const imageUrl = uploadRes.infos[0].url;

                // 4. 카카오톡 공유 실행 (버튼 및 OS 딥링크 파라미터 추가)
                Kakao.Share.sendDefault({
                    objectType: 'feed',
                    content: {
                        title: shareText,
                        imageUrl: imageUrl,
                        link: {
                            // PC나 앱 미설치 환경을 대비한 기본 웹 링크
                            mobileWebUrl: 'https://[내아이디].github.io/[레포지토리명]',
                            webUrl: 'https://[내아이디].github.io/[레포지토리명]',
                            
                            // ✨ 핵심: 앱이 설치되어 있을 경우 OS별로 앱을 실행하게 만드는 파라미터
                            // (유니티 딥링크 수신부로 넘겨줄 값이 없다면 빈 문자열 '' 로 두어도 앱은 실행됩니다)
                            androidExecutionParams: 'from=kakao', 
                            iosExecutionParams: 'from=kakao'
                        },
                    },
                    // 하단 버튼 리스트 (최대 2개 권장)
                    buttons: [
                        {
                            title: '앱에서 보기', // 유저에게 보여질 버튼 텍스트
                            link: {
                                // PC나 앱 미설치 환경을 대비한 기본 웹 링크
                                mobileWebUrl: 'https://[내아이디].github.io/[레포지토리명]',
                                webUrl: 'https://[내아이디].github.io/[레포지토리명]',
                                
                                // ✨ 핵심: 앱이 설치되어 있을 경우 OS별로 앱을 실행하게 만드는 파라미터
                                // (유니티 딥링크 수신부로 넘겨줄 값이 없다면 빈 문자열 '' 로 두어도 앱은 실행됩니다)
                                androidExecutionParams: 'from=kakao', 
                                iosExecutionParams: 'from=kakao'
                            }
                        }
                    ]
                });
            } catch (error) {
                console.error(error);
                sendErrorToUnity('OTHER_ERROR');
            }
        }

        // (base64ToFile 와 sendErrorToUnity 함수는 작성하신 그대로 사용하시면 됩니다.)
        function base64ToFile(base64String, filename) { ... }
        function sendErrorToUnity(errorCode) { ... }
    </script>
</body>
</html>
