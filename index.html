<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Kakao Share</title>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
</head>
<body>
    <script>
        // 본인 카카오 앱 키 적용 완료
        Kakao.init('b8650fa94e9f3a155c0c164546eab991'); 

        // [Step 1] 유니티에서 호출: 이미지만 업로드하고 URL을 유니티로 반환
        async function uploadKakaoImage(base64Image) {
            try {
                const file = base64ToFile(base64Image, 'share_image.jpg');
                const uploadRes = await Kakao.Share.uploadImage({ file: [file] });
                
                let imageUrl = '';
                if (uploadRes && uploadRes.infos && uploadRes.infos.original && uploadRes.infos.original.url) {
                    imageUrl = uploadRes.infos.original.url;
                } else if (uploadRes && uploadRes.infos && uploadRes.infos.length > 0) {
                    imageUrl = uploadRes.infos[0].url;
                } else if (Array.isArray(uploadRes) && uploadRes.length > 0) {
                    imageUrl = uploadRes[0].url;
                } else if (uploadRes && uploadRes.url) {
                    imageUrl = uploadRes.url;
                } else {
                    throw new Error("URL 찾기 실패: " + JSON.stringify(uploadRes));
                }

                // 업로드 완료! 딥링크 실행 안 하고 오직 URL만 유니티로 먼저 쏨
                window.location.href = "uniwebview://kakaoshare?url=" + encodeURIComponent(imageUrl);
            } catch (error) {
                // 에러 처리 코드 압축 (기존 여러 줄을 2줄로 줄임)
                let errStr = typeof error === 'object' ? (error.message || JSON.stringify(error)) : String(error);
                window.location.href = "uniwebview://kakaoshare?error=" + encodeURIComponent(errStr);
            }
        }

        // [Step 2] 유니티에서 호출: 이미지 URL을 안전하게 받은 후 딥링크만 실행
        function executeKakaoShare(imageUrl, shareText) {
            Kakao.Share.sendDefault({
                objectType: 'feed',
                content: {
                    title: shareText,
                    imageUrl: imageUrl,
                    imageRatio: '4:5',
                    link: {
                        mobileWebUrl: 'https://buildhangul.app/',
                        webUrl: 'https://buildhangul.app/',
                        androidExecutionParams: 'from=kakao', 
                        iosExecutionParams: 'from=kakao'
                    },
                },
                buttons: [
                    {
                        title: '앱에서 보기',
                        link: {
                            mobileWebUrl: 'https://buildhangul.app/',
                            webUrl: 'https://buildhangul.app/',
                            androidExecutionParams: 'from=kakao', 
                            iosExecutionParams: 'from=kakao'
                        }
                    }
                ]
            });
        }

        // Base64 변환 유틸
        function base64ToFile(base64String, filename) {
            let bstr = '';
            let mime = 'image/jpeg'; 
            if (base64String.startsWith('data:')) {
                let arr = base64String.split(',');
                mime = arr[0].match(/:(.*?);/)[1];
                bstr = atob(arr[1]);
            } else {
                bstr = atob(base64String);
            }
            let n = bstr.length;
            let u8arr = new Uint8Array(n);
            while(n--){ u8arr[n] = bstr.charCodeAt(n); }
            return new File([u8arr], filename, {type: mime});
        }
    </script>
</body>
</html>
