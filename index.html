<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Kakao Share</title>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
</head>
<body>
    <script>
        Kakao.init('b8650fa94e9f3a155c0c164546eab991'); 

        async function shareFromUnity(base64Image, shareText) {
            try {
                const file = base64ToFile(base64Image, 'share_image.jpg');
                const uploadRes = await Kakao.Share.uploadImage({
                    file: [file]
                });
                
                // ⭐ 카카오 SDK 응답 형태가 어찌되든 무조건 URL을 뽑아내는 방탄 로직
                let imageUrl = '';
                if (uploadRes && uploadRes.infos && uploadRes.infos.length > 0) {
                    imageUrl = uploadRes.infos[0].url;
                } else if (Array.isArray(uploadRes) && uploadRes.length > 0) {
                    imageUrl = uploadRes[0].url; // 배열로 바로 올 경우
                } else if (uploadRes && uploadRes.url) {
                    imageUrl = uploadRes.url; // 단일 객체일 경우
                } else {
                    throw new Error("카카오 응답에서 이미지 URL을 찾을 수 없음: " + JSON.stringify(uploadRes));
                }

                // ⭐ [핵심 오타 수정] uniwebview:// 로 쏴야 유니티가 가로챔!
                window.location.href = "uniwebview://kakaoshare?url=" + encodeURIComponent(imageUrl);

                Kakao.Share.sendDefault({
                    objectType: 'feed',
                    content: {
                        title: shareText,
                        imageUrl: imageUrl,
                        link: {
                            mobileWebUrl: 'https://[내아이디].github.io/[레포지토리명]',
                            webUrl: 'https://[내아이디].github.io/[레포지토리명]',
                        },
                    },
                    buttons: [
                        {
                            title: '앱에서 보기',
                            link: {
                                mobileWebUrl: 'https://[내아이디].github.io/[레포지토리명]',
                                webUrl: 'https://[내아이디].github.io/[레포지토리명]',
                                androidExecutionParams: 'from=kakao', 
                                iosExecutionParams: 'from=kakao'
                            }
                        }
                    ]
                });
            } catch (error) {
                // ⭐ 카카오가 던지는 에러 형태가 뭐든 간에 강제로 문자열로 풀어서 유니티로 보냄
                let errorString = "알 수 없는 에러";
                if (typeof error === 'object') {
                    // 에러가 JSON 객체일 경우 (카카오 API 에러의 99%)
                    errorString = JSON.stringify(error);
                    // 간혹 error.message가 있는 표준 에러일 경우
                    if (error.message) errorString = error.message; 
                } else {
                    errorString = String(error);
                }
                
                window.location.href = "uniwebview://kakaoshare?error=" + encodeURIComponent(errorString);
            }
        }

        function base64ToFile(base64String, filename) {
            let bstr = '';
            let mime = 'image/jpeg'; 

            if (base64String.startsWith('data:')) {
                let arr = base64String.split(',');
                mime = arr[0].match(/:(.*?);/)[1];
                bstr = atob(arr[1]);
            } else {
                bstr = atob(base64String);
            }

            let n = bstr.length;
            let u8arr = new Uint8Array(n);
            while(n--){
                u8arr[n] = bstr.charCodeAt(n);
            }
            return new File([u8arr], filename, {type: mime});
        }
    </script>
</body>
</html>
